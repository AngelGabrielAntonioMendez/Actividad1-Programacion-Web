<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio12-Conversor MXN a USD</title>
    <style>
        body {
            background-color: #0b0710; 
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .calculator-container {
            background-color: #1a1025; 
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            width: 320px;
            text-align: center;
            border: 1px solid #332244;
        }

        h2 {
            margin-top: 0;
            font-size: 1.5rem;
            color: #ffffff;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #a395b0;
        }

        .input-group input {
            width: 90%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #4a2e6b;
            background-color: #261835;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: #9d4edd;
        }

        .input-group input[readonly] {
            background-color: #140c1c;
            color: #4ade80; 
            border: 1px dashed #4a2e6b;
            cursor: not-allowed;
        }

        .btn-convertir {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(90deg, #6b21a8, #d946ef); 
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            margin-top: 10px;
        }

        .btn-convertir:hover {
            opacity: 0.9;
            transform: scale(1.03);
        }

        .btn-convertir:active {
            transform: scale(0.98);
        }
        
        .error-message {
            color: #ff4d4d;
            font-size: 0.85rem;
            margin-top: -15px;
            margin-bottom: 15px;
            display: none;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="calculator-container">
        <h2>Conversor de Divisas</h2>
        
        <div class="input-group">
            <label for="mxnInput">Pesos Mexicanos (MXN)</label>
            <input type="number" id="mxnInput" placeholder="Ej. 500" step="0.01">
        </div>
        
        <div class="error-message" id="errorMsg">Por favor, ingresa un número válido mayor a 0.</div>

        <div class="input-group">
            <label for="usdOutput">Dólares Estadounidenses (USD)</label>
            <input type="text" id="usdOutput" placeholder="0.00" readonly>
        </div>

        <button class="btn-convertir" id="convertBtn">Convertir</button>
    </div>

    <script src="js/ejercicio12.js"></script>
</body>
</html>
