<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Calculadora de operaciones básicas utilizando funciones flecha en JavaScript y diseño responsivo premium.">
    <title>Ejercicio 16 - Calculadora de Números (Funciones Flecha)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="css/ejercicio16.css">
</head>
<body>
    <div class="calculator-card">
        <header class="calculator-header">
            <a href="index.html" class="back-link" title="Volver al inicio">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                <span>Volver</span>
            </a>
            <h1>Calculadora de Números</h1>
            <p class="subtitle">Operaciones básicas utilizando Funciones Flecha</p>
        </header>

        <main class="calculator-body">
            <div class="input-group">
                <label for="numero1">Primer Número (Número 1)</label>
                <div class="input-wrapper">
                    <input type="text" id="numero1" placeholder="Ej. 15.5" autocomplete="off">
                </div>
            </div>

            <div class="input-group">
                <label for="numero2">Segundo Número (Número 2)</label>
                <div class="input-wrapper">
                    <input type="text" id="numero2" placeholder="Ej. 5" autocomplete="off">
                </div>
            </div>

            <div class="operations-grid">
                <button type="button" class="btn btn-op btn-suma" onclick="calcularOperacion('suma')">
                    <span class="btn-icon">+</span>
                    <span class="btn-text">Sumar</span>
                </button>
                <button type="button" class="btn btn-op btn-resta" onclick="calcularOperacion('resta')">
                    <span class="btn-icon">−</span>
                    <span class="btn-text">Restar</span>
                </button>
                <button type="button" class="btn btn-op btn-multiplica" onclick="calcularOperacion('multiplicacion')">
                    <span class="btn-icon">×</span>
                    <span class="btn-text">Multiplicar</span>
                </button>
                <button type="button" class="btn btn-op btn-divide" onclick="calcularOperacion('division')">
                    <span class="btn-icon">÷</span>
                    <span class="btn-text">Dividir</span>
                </button>
            </div>

            <hr class="divider">

            <div class="input-group result-group">
                <label for="resultado">Resultado de la Operación</label>
                <div class="input-wrapper">
                    <input type="text" id="resultado" placeholder="Esperando operación..." readonly>
                </div>
            </div>
        </main>
    </div>

    <script src="js/ejercicio16.js"></script>
</body>
</html>
