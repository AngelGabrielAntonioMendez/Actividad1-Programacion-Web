<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio14-Mayor, Menor y Promedio</title>
    <style>
        body {
            background-color: #0b0710;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .calculator-container {
            background-color: #1a1025;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            width: 320px;
            text-align: center;
            border: 1px solid #332244;
        }

        h2 {
            margin-top: 0;
            font-size: 1.5rem;
            color: #ffffff;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #a395b0;
        }

        .input-group input {
            width: 90%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #4a2e6b;
            background-color: #261835;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: #9d4edd;
        }

        .input-group input[readonly] {
            background-color: #140c1c;
            color: #4ade80;
            border: 1px dashed #4a2e6b;
            cursor: not-allowed;
        }

        .btn-convertir {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(90deg, #6b21a8, #d946ef);
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            margin-top: 10px;
        }

        .btn-convertir:hover {
            opacity: 0.9;
            transform: scale(1.03);
        }

        .btn-convertir:active {
            transform: scale(0.98);
        }

        .error-message {
            color: #ff4d4d;
            font-size: 0.85rem;
            margin-top: -15px;
            margin-bottom: 15px;
            display: none;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="calculator-container">
        <h2>Mayor, Menor y Promedio</h2>

        <div class="input-group">
            <label for="numerosInput">Números (separados por comas)</label>
            <input type="text" id="numerosInput" placeholder="Ej. 10, 20, 30">
        </div>

        <div class="error-message" id="errorMsg">Ingresa números válidos separados por comas.</div>

        <div class="input-group">
            <label for="mayorOutput">Número mayor</label>
            <input type="text" id="mayorOutput" placeholder="..." readonly>
        </div>

        <div class="input-group">
            <label for="menorOutput">Número menor</label>
            <input type="text" id="menorOutput" placeholder="..." readonly>
        </div>

        <div class="input-group">
            <label for="promedioOutput">Promedio</label>
            <input type="text" id="promedioOutput" placeholder="..." readonly>
        </div>

        <button class="btn-convertir" id="calcularBtn">Calcular</button>
    </div>

    <script src="js/ejercicio14.js"></script>
</body>
</html>
