<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio15-Estudiantes y Calificaciones</title>
    <style>
        body {
            background-color: #0b0710;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 30px 0;
        }

        .calculator-container {
            background-color: #1a1025;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            width: 320px;
            text-align: center;
            border: 1px solid #332244;
        }

        h2 {
            margin-top: 0;
            font-size: 1.5rem;
            color: #ffffff;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #a395b0;
        }

        .input-group input {
            width: 90%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #4a2e6b;
            background-color: #261835;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: #9d4edd;
        }

        .input-group input[readonly] {
            background-color: #140c1c;
            color: #4ade80;
            border: 1px dashed #4a2e6b;
            cursor: not-allowed;
        }

        .btn-convertir {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(90deg, #6b21a8, #d946ef);
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            margin-top: 10px;
        }

        .btn-convertir:hover {
            opacity: 0.9;
            transform: scale(1.03);
        }

        .btn-convertir:active {
            transform: scale(0.98);
        }

        .btn-agregar {
            background: transparent;
            border: 1px solid #9d4edd;
            color: #d946ef;
        }

        .btn-agregar:hover {
            background-color: #261835;
            opacity: 1;
        }

        .error-message {
            color: #ff4d4d;
            font-size: 0.85rem;
            margin-top: -15px;
            margin-bottom: 15px;
            display: none;
            text-align: left;
        }

        .lista-estudiantes {
            list-style: none;
            padding: 0;
            margin: 0 0 20px 0;
            max-height: 130px;
            overflow-y: auto;
            text-align: left;
        }

        .lista-estudiantes li {
            background-color: #261835;
            border: 1px solid #4a2e6b;
            border-radius: 10px;
            padding: 8px 12px;
            margin-bottom: 8px;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
        }

        .lista-estudiantes .sin-estudiantes {
            background: none;
            border: none;
            color: #a395b0;
            text-align: center;
            padding: 4px;
        }

        hr {
            border: none;
            border-top: 1px solid #332244;
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div class="calculator-container">
        <h2>Estudiantes y Calificaciones</h2>

        <div class="input-group">
            <label for="nombreInput">Nombre del estudiante</label>
            <input type="text" id="nombreInput" placeholder="Ej. Juan">
        </div>

        <div class="input-group">
            <label for="calificacionInput">Calificación</label>
            <input type="number" id="calificacionInput" placeholder="Ej. 85" step="0.1">
        </div>

        <div class="error-message" id="errorMsg">Ingresa un nombre y una calificación numérica válidos.</div>

        <button class="btn-convertir btn-agregar" id="agregarBtn">Agregar estudiante</button>

        <ul class="lista-estudiantes" id="listaEstudiantes">
            <li class="sin-estudiantes">Sin estudiantes agregados</li>
        </ul>

        <hr>

        <div class="input-group">
            <label for="promedioOutput">Calificación promedio</label>
            <input type="text" id="promedioOutput" placeholder="..." readonly>
        </div>

        <div class="input-group">
            <label for="masAltaOutput">Calificación más alta</label>
            <input type="text" id="masAltaOutput" placeholder="..." readonly>
        </div>

        <div class="input-group">
            <label for="masBajaOutput">Calificación más baja</label>
            <input type="text" id="masBajaOutput" placeholder="..." readonly>
        </div>

        <button class="btn-convertir" id="calcularBtn">Calcular</button>
    </div>

    <script src="js/ejercicio15.js"></script>
</body>
</html>
